
services:
  # ============================================
  # Infrastructure Services
  # ============================================
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    networks:
      - microservice-network
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka-init
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic certificate-requests --replication-factor 1 --partitions 1 &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic pdf-generation-requests --replication-factor 1 --partitions 1 &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic pdf-generation-complete --replication-factor 1 --partitions 1 &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic admin-logs --replication-factor 1 --partitions 1
      "
    networks:
      - microservice-network

  # ============================================
  # Microservices
  # ============================================

  birth-backend:
    build: ./birth_certificate/backend
    container_name: birth-backend
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      PORT: 3001
      NODE_ENV: production
      KAFKA_BROKER: kafka:29092
      DATABASE_PATH: /app/data/submissions.db
      SHARED_STORAGE_PATH: /app/certificates
    volumes:
      - ./birth_certificate/backend/data:/app/data
      - shared-certificates:/app/certificates:ro
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  birth-frontend:
    build: ./birth_certificate/frontend
    container_name: birth-frontend
    restart: unless-stopped
    depends_on:
      - birth-backend
    networks:
      - microservice-network

  death-backend:
    build: ./death_certificate/backend
    container_name: death-backend
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      PORT: 3002
      NODE_ENV: production
      KAFKA_BROKER: kafka:29092
      DATABASE_PATH: /app/data/submissions.db
      SHARED_STORAGE_PATH: /app/certificates
    volumes:
      - ./death_certificate/backend/data:/app/data
      - shared-certificates:/app/certificates:ro
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  death-frontend:
    build: ./death_certificate/frontend
    container_name: death-frontend
    restart: unless-stopped
    depends_on:
      - death-backend
    networks:
      - microservice-network

  pdf-service:
    build: ./pdf_service/backend
    container_name: pdf-service
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      PORT: 3003
      NODE_ENV: production
      KAFKA_BROKER: kafka:29092
      DATABASE_PATH: /app/data/pdfs.db
      CERTIFICATES_PATH: /app/certificates
    volumes:
      - ./pdf_service/backend/data:/app/data
      - shared-certificates:/app/certificates
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin-backend:
    build: ./admin/backend
    container_name: admin-backend
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      PORT: 3004
      NODE_ENV: production
      KAFKA_BROKER: kafka:29092
      DATABASE_PATH: /app/data/admin.db
      SHARED_STORAGE_PATH: /app/certificates
    volumes:
      - ./admin/backend/data:/app/data
      - shared-certificates:/app/certificates:ro
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin-frontend:
    build: ./admin/frontend
    container_name: admin-frontend
    restart: unless-stopped
    depends_on:
      - admin-backend
    networks:
      - microservice-network

  # ============================================
  # API Gateway
  # ============================================

  gateway:
    image: nginx:1.27-alpine
    container_name: gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dashboard:/usr/share/nginx/html/dashboard:ro
    depends_on:
      - birth-frontend
      - death-frontend
      - admin-frontend
      - birth-backend
      - death-backend
      - pdf-service
      - admin-backend
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ============================================
# Networks & Volumes
# ============================================

networks:
  microservice-network:
    driver: bridge

volumes:
  shared-certificates:
    driver: local
  zookeeper-data:
    driver: local
  zookeeper-log:
    driver: local
  kafka-data:
    driver: local
