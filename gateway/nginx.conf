events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Upstream services
    upstream birth-service {
        server birth-backend:3001;
    }

    upstream death-service {
        server death-backend:3002;
    }

    upstream pdf-service {
        server pdf-service:3003;
    }

    upstream admin-service {
        server admin-backend:3004;
    }

    upstream admin-websocket {
        server admin-backend:3004;
    }

    upstream birth-frontend-service {
        server birth-frontend:80;
    }

    upstream death-frontend-service {
        server death-frontend:80;
    }

    upstream admin-frontend-service {
        server admin-frontend:80;
    }

    server {
        listen 80;
        server_name localhost;

        # Dashboard - Main landing page
        location / {
            root /usr/share/nginx/html/dashboard;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Gateway health check
        location /health {
            access_log off;
            return 200 "Gateway OK\n";
            add_header Content-Type text/plain;
        }

        # ==========================================
        # Backend API Routes
        # ==========================================

        # Birth certificate API
        location /api/birth/ {
            proxy_pass http://birth-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Death certificate API
        location /api/death/ {
            proxy_pass http://death-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # PDF service API
        location /api/pdf/ {
            proxy_pass http://pdf-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin API
        location /api/admin/ {
            proxy_pass http://admin-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # Frontend Routes
        # ==========================================

        # Birth certificate frontend
        location /birth-certificate {
            proxy_pass http://birth-frontend-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Death certificate frontend
        location /death-certificate {
            proxy_pass http://death-frontend-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Admin frontend
        location /admin {
            proxy_pass http://admin-frontend-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ==========================================
        # WebSocket Routes
        # ==========================================

        # Admin panel WebSocket for real-time updates
        location /ws/admin {
            proxy_pass http://admin-websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }
    }
}
